<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        .mensaje-exito {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <h2>Contáctame</h2>

        <div id="mensajeExito" class="mensaje-exito">
            Mensaje enviado correctamente. Pronto me pondré en contacto contigo.
        </div>

        <form action="https://formsubmit.co/jose.ruiz.ariza@gmail.com" method="POST">

            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <label>Correo</label>
            <input type="email" name="correo" required>

            <label>Mensaje</label>
            <textarea name="mensaje" rows="5" required></textarea>

            <input type="hidden" name="_subject" value="Nuevo mensaje desde GitHub Pages">

            <input type="hidden" name="_captcha" value="false">

            <input type="hidden" name="_next" value="https://jruiz18.github.io/formulario-contacto/?enviado=true">

            <button type="submit">Enviar mensaje</button>

        </form>

    </div>

    <script>
        const parametros = new URLSearchParams(window.location.search);

        if (parametros.get("enviado") === "true") {
            document.getElementById("mensajeExito").style.display = "block";
        }
    </script>

</body>
</html>
