<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .contenedor{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background-color: #333;
        }

    </style>

</head>
<body>

    <div class="contenedor">

        <h2>Contáctame</h2>

        <form action="https://formsubmit.co/jose.ruiz.ariza@gmail.com" method="POST">

            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <label>Correo</label>
            <input type="email" name="correo" required>

            <label>Mensaje</label>
            <textarea name="mensaje" rows="5" required></textarea>

            <!-- Asunto del correo -->
            <input type="hidden" 
                   name="_subject" 
                   value="Nuevo mensaje desde GitHub Pages">

            <!-- Desactivar captcha -->
            <input type="hidden" 
                   name="_captcha" 
                   value="false">

            <!-- Página de confirmación -->
            <input type="hidden" 
                   name="_next" 
                   value="https://jruiz18.github.io/gracias.html">

            <button type="submit">
                Enviar mensaje
            </button>

        </form>

    </div>

</body>
</html>
